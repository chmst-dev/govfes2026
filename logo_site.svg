<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="100%" height="100%">
  <g transform="translate(15, 10)">
    <!-- リンク（線） -->
    <g stroke="#4caf7d" stroke-width="2.5" opacity="0.9">
      <line x1="15" y1="30" x2="35" y2="12" />
      <line x1="15" y1="30" x2="35" y2="48" />
      <line x1="15" y1="30" x2="55" y2="30" />
      <line x1="35" y1="12" x2="55" y2="30" />
      <line x1="35" y1="48" x2="55" y2="30" />
      <line x1="35" y1="12" x2="70" y2="20" />
      <line x1="35" y1="48" x2="70" y2="40" />
      <line x1="55" y1="30" x2="70" y2="20" />
      <line x1="55" y1="30" x2="70" y2="40" />
      <line x1="70" y1="20" x2="70" y2="40" />
      <!-- 立体感を出すための追加の線 -->
      <line x1="15" y1="30" x2="70" y2="20" stroke-dasharray="2,2" stroke-width="1.5" opacity="0.6" />
      <line x1="15" y1="30" x2="70" y2="40" stroke-dasharray="2,2" stroke-width="1.5" opacity="0.6" />
    </g>
    <!-- ノード（点） -->
    <g fill="#4caf7d">
      <circle cx="15" cy="30" r="5" />
      <circle cx="35" cy="12" r="5" />
      <circle cx="35" cy="48" r="5" />
      <circle cx="55" cy="30" r="5" />
      <circle cx="70" cy="20" r="5" />
      <circle cx="70" cy="40" r="5" />
    </g>
  </g>
  <!-- テキスト: Gocfes2026 -->
  <text x="110" y="52" fill="#ffffff" font-family="'Noto Sans JP', sans-serif" font-weight="900" font-size="30" letter-spacing="0.04em">Gocfes2026</text>
</svg>
